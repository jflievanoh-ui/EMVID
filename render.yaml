services:
  - type: web
    name: emvid-backend
    env: python
    repo: https://github.com/jflievanoh-ui/EMVID
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    plan: free
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        value: mongodb+srv://jflievanoh:bdoCNPdj7Ud0X4AC@emvid.e1xccmc.mongodb.net/?retryWrites=true&w=majority&appName=emvid

  - type: web
    name: emvid-frontend
    env: static
    repo: https://github.com/jflievanoh-ui/EMVID
    branch: main
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    autoDeploy: true
